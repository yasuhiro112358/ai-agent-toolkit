[pack]
# Source directory to scan (required)
src = ./src

# Output file path
dest = pack.txt

# Max characters per chunk (empty = no limit)
chunk_size = 50000

# Whitelist patterns, space-separated
# Only matching files are packed. Empty = pack all files under src
# When used with exclude, exclude further narrows the result
include =

# Blacklist patterns, space-separated
# Matching files are skipped. Empty = skip nothing
# When used with include, applied after include filtering
exclude =

# Extension list, space-separated
# Replaces (not adds to) the built-in defaults (C/C++, Java, C#, Python, TypeScript, etc.)
# e.g. ext = .py .ts  -> scans only .py and .ts files
# Empty = use built-in defaults
ext =
